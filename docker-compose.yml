services:
  postgres:
    image: postgres:16-alpine
    container_name: million-miles-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-million_miles}
      POSTGRES_USER: ${POSTGRES_USER:-million_miles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-million_miles}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-million_miles} -d ${POSTGRES_DB:-million_miles}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: million-miles-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: million-miles-api
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-million_miles}:${POSTGRES_PASSWORD:-million_miles}@postgres:5432/${POSTGRES_DB:-million_miles}
      STARTUP_SYNC_ENABLED: ${STARTUP_SYNC_ENABLED:-1}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command:
      - uvicorn
      - back.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: million-miles-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-million_miles}:${POSTGRES_PASSWORD:-million_miles}@postgres:5432/${POSTGRES_DB:-million_miles}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    command:
      - python
      - -m
      - celery
      - -A
      - back.celery_app:celery_app
      - worker
      - --loglevel=info
      - --pool=solo

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: million-miles-beat
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-million_miles}:${POSTGRES_PASSWORD:-million_miles}@postgres:5432/${POSTGRES_DB:-million_miles}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
    volumes:
      - beat_state:/app/.celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    restart: unless-stopped
    command:
      - python
      - -m
      - celery
      - -A
      - back.celery_app:celery_app
      - beat
      - --loglevel=info
      - --schedule
      - /app/.celery/celerybeat-schedule

  front:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: million-miles-front
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  beat_state:
